AWSTemplateFormatVersion: '2010-09-09'
Description: 'Bedrock Knowledge Base for Incident Response System'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  KnowledgeBaseBucketName:
    Type: String
    Description: S3 bucket name for Knowledge Base data source
  
  BedrockKnowledgeBaseRoleArn:
    Type: String
    Description: IAM role ARN for Bedrock Knowledge Base

Resources:
  # Note: Bedrock Knowledge Base cannot be fully created via CloudFormation
  # This template provides the configuration structure
  # Actual creation must be done via AWS CLI or Console
  
  KnowledgeBaseConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/incident-response/${Environment}/kb-config'
      Type: String
      Value: !Sub |
        {
          "name": "incident-history-kb-${Environment}",
          "description": "Historical incident data for RAG-powered root cause analysis",
          "roleArn": "${BedrockKnowledgeBaseRoleArn}",
          "knowledgeBaseConfiguration": {
            "type": "VECTOR",
            "vectorKnowledgeBaseConfiguration": {
              "embeddingModelArn": "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v1"
            }
          },
          "storageConfiguration": {
            "type": "OPENSEARCH_SERVERLESS",
            "opensearchServerlessConfiguration": {
              "collectionArn": "TO_BE_CREATED",
              "vectorIndexName": "incident-history-index",
              "fieldMapping": {
                "vectorField": "embedding",
                "textField": "text",
                "metadataField": "metadata"
              }
            }
          }
        }
      Description: Bedrock Knowledge Base configuration for incident response
      Tags:
        Environment: !Ref Environment
        Project: IncidentResponseSystem
  
  DataSourceConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/incident-response/${Environment}/kb-datasource-config'
      Type: String
      Value: !Sub |
        {
          "name": "incident-s3-datasource-${Environment}",
          "description": "S3 data source for incident history",
          "dataSourceConfiguration": {
            "type": "S3",
            "s3Configuration": {
              "bucketArn": "arn:aws:s3:::${KnowledgeBaseBucketName}",
              "inclusionPrefixes": ["incidents/"]
            }
          },
          "vectorIngestionConfiguration": {
            "chunkingConfiguration": {
              "chunkingStrategy": "FIXED_SIZE",
              "fixedSizeChunkingConfiguration": {
                "maxTokens": 512,
                "overlapPercentage": 20
              }
            }
          }
        }
      Description: Data source configuration for Bedrock Knowledge Base
      Tags:
        Environment: !Ref Environment
        Project: IncidentResponseSystem

Outputs:
  KnowledgeBaseConfigParameter:
    Description: SSM Parameter containing Knowledge Base configuration
    Value: !Ref KnowledgeBaseConfig
    Export:
      Name: !Sub '${AWS::StackName}-KBConfig'
  
  DataSourceConfigParameter:
    Description: SSM Parameter containing Data Source configuration
    Value: !Ref DataSourceConfig
    Export:
      Name: !Sub '${AWS::StackName}-DataSourceConfig'
  
  SetupInstructions:
    Description: Instructions for completing Knowledge Base setup
    Value: !Sub |
      1. Create OpenSearch Serverless collection: aws opensearchserverless create-collection --name incident-kb-${Environment} --type VECTORSEARCH
      2. Create Knowledge Base using config from SSM parameter: ${KnowledgeBaseConfig}
      3. Create Data Source using config from SSM parameter: ${DataSourceConfig}
      4. Run ingestion job to index initial data
      5. Update Lambda environment variables with Knowledge Base ID
