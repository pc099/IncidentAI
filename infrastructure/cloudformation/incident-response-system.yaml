AWSTemplateFormatVersion: '2010-09-09'
Description: 'AI-Powered Incident Response System - Multi-Agent Architecture with AWS Strands and Bedrock'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  SenderEmail:
    Type: String
    Default: incidents@example.com
    Description: Email address for sending incident alerts (must be verified in SES)
  
  OnCallEngineersEmail:
    Type: String
    Description: Comma-separated list of on-call engineer email addresses
  
  StakeholdersEmail:
    Type: String
    Default: ''
    Description: Comma-separated list of stakeholder email addresses (optional)
  
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: Bedrock model ID for Claude
  
  ApiRateLimit:
    Type: Number
    Default: 100
    Description: API Gateway rate limit (requests per minute)

Resources:
  # ==================== S3 Buckets ====================
  
  LogStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'incident-logs-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  KnowledgeBaseDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'incident-kb-data-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  # ==================== DynamoDB Table ====================
  
  IncidentHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'incident-history-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incident_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: service_name
          AttributeType: S
      KeySchema:
        - AttributeName: incident_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: service-timestamp-index
          KeySchema:
            - AttributeName: service_name
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  # ==================== IAM Roles ====================
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'IncidentResponseLambdaRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IncidentResponsePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # S3 Permissions
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt LogStorageBucket.Arn
                  - !Sub '${LogStorageBucket.Arn}/*'
                  - !GetAtt KnowledgeBaseDataBucket.Arn
                  - !Sub '${KnowledgeBaseDataBucket.Arn}/*'
              # DynamoDB Permissions
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt IncidentHistoryTable.Arn
                  - !Sub '${IncidentHistoryTable.Arn}/index/*'
              # SES Permissions
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
              # Bedrock Permissions
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}'
              # Bedrock Agent Runtime Permissions
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: '*'
              # CloudWatch Permissions
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  BedrockKnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'BedrockKnowledgeBaseRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KnowledgeBaseS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt KnowledgeBaseDataBucket.Arn
                  - !Sub '${KnowledgeBaseDataBucket.Arn}/*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  # ==================== Lambda Functions ====================
  
  ApiValidationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'incident-api-validation-${Environment}'
      Runtime: python3.11
      Handler: api.incident_validator.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Sub 'incident-response-deployment-${AWS::AccountId}'
        S3Key: !Sub 'lambda-packages/${Environment}/api-validation.zip'
      Timeout: 30
      MemorySize: 256
      Architectures:
        - arm64
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          ORCHESTRATOR_FUNCTION_ARN: !GetAtt OrchestratorFunction.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  OrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'incident-orchestrator-${Environment}'
      Runtime: python3.11
      Handler: orchestrator.agent_orchestrator.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Sub 'incident-response-deployment-${AWS::AccountId}'
        S3Key: !Sub 'lambda-packages/${Environment}/orchestrator.zip'
      Timeout: 300
      MemorySize: 1024
      Architectures:
        - arm64
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          LOG_BUCKET: !Ref LogStorageBucket
          KB_DATA_BUCKET: !Ref KnowledgeBaseDataBucket
          DYNAMODB_TABLE: !Ref IncidentHistoryTable
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          SENDER_EMAIL: !Ref SenderEmail
          ONCALL_EMAILS: !Ref OnCallEngineersEmail
          STAKEHOLDER_EMAILS: !Ref StakeholdersEmail
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  # ==================== API Gateway ====================
  
  IncidentApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'incident-response-api-${Environment}'
      Description: API for triggering incident analysis
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: IncidentResponseSystem
  
  IncidentsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref IncidentApi
      ParentId: !GetAtt IncidentApi.RootResourceId
      PathPart: incidents
  
  IncidentsPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref IncidentApi
      ResourceId: !Ref IncidentsResource
      HttpMethod: POST
      AuthorizationType: AWS_IAM
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiValidationFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 202
        - StatusCode: 400
        - StatusCode: 429
  
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - IncidentsPostMethod
    Properties:
      RestApiId: !Ref IncidentApi
      StageName: !Ref Environment
  
  ApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub 'incident-response-usage-plan-${Environment}'
      ApiStages:
        - ApiId: !Ref IncidentApi
          Stage: !Ref Environment
      Throttle:
        RateLimit: !Ref ApiRateLimit
        BurstLimit: !Ref ApiRateLimit
  
  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub 'incident-response-api-key-${Environment}'
      Enabled: true
  
  ApiUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ApiUsagePlan
  
  # Lambda Permissions
  ApiValidationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiValidationFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${IncidentApi}/*/*/*'
  
  # ==================== CloudWatch Dashboard ====================
  
  IncidentResponseDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'IncidentResponse-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["IncidentResponse", "IncidentVolume", {"stat": "Sum", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Incident Volume",
                "period": 300
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["IncidentResponse", "ProcessingTime", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Average Processing Time",
                "period": 300,
                "yAxis": {
                  "left": {
                    "label": "Seconds"
                  }
                }
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["IncidentResponse", "ConfidenceScore", {"stat": "Average", "period": 300}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Average Confidence Score",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 100
                  }
                }
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["IncidentResponse", "AgentSuccess", "Agent", "log-analysis", {"stat": "Average"}],
                  ["...", "root-cause", {"stat": "Average"}],
                  ["...", "fix-recommendation", {"stat": "Average"}],
                  ["...", "communication", {"stat": "Average"}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Agent Success Rates",
                "period": 300,
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 1
                  }
                }
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["IncidentResponse", "TokenUsage", {"stat": "Sum", "period": 3600}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Bedrock Token Usage (Hourly)",
                "period": 3600
              }
            },
            {
              "type": "log",
              "properties": {
                "query": "SOURCE '/aws/lambda/incident-orchestrator-${Environment}'\n| fields @timestamp, @message\n| filter @message like /ERROR/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Recent Errors",
                "stacked": false
              }
            }
          ]
        }
  
  # ==================== CloudWatch Alarms ====================
  
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'IncidentResponse-HighLatency-${Environment}'
      AlarmDescription: Alert when incident processing exceeds 60 seconds
      MetricName: ProcessingTime
      Namespace: IncidentResponse
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 60
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
  
  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'IncidentResponse-HighErrorRate-${Environment}'
      AlarmDescription: Alert when agent error rate exceeds 20%
      MetricName: AgentFailureRate
      Namespace: IncidentResponse
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 0.2
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
  
  TokenUsageWarningAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'IncidentResponse-TokenUsageWarning-${Environment}'
      AlarmDescription: Alert when approaching Free Tier token limits
      MetricName: TokenUsagePercentage
      Namespace: IncidentResponse
      Statistic: Maximum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${IncidentApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/incidents'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'
  
  ApiKeyId:
    Description: API Key ID for authentication
    Value: !Ref ApiKey
    Export:
      Name: !Sub '${AWS::StackName}-ApiKeyId'
  
  LogBucketName:
    Description: S3 bucket for log storage
    Value: !Ref LogStorageBucket
    Export:
      Name: !Sub '${AWS::StackName}-LogBucket'
  
  KnowledgeBaseBucketName:
    Description: S3 bucket for Knowledge Base data
    Value: !Ref KnowledgeBaseDataBucket
    Export:
      Name: !Sub '${AWS::StackName}-KBBucket'
  
  DynamoDBTableName:
    Description: DynamoDB table for incident history
    Value: !Ref IncidentHistoryTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTable'
  
  OrchestratorFunctionArn:
    Description: ARN of the orchestrator Lambda function
    Value: !GetAtt OrchestratorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OrchestratorArn'
  
  DashboardURL:
    Description: CloudWatch Dashboard URL
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=IncidentResponse-${Environment}'
